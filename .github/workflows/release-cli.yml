name: Release CLI

# Cuts a GitHub Release with the prebuilt CLI binary attached as krabs.mjs.
# No npm publish: distribution is via curl from the Release URL or via
# `pnpm kickoff` (git clone). See public/install.sh for the one-liner.
#
# Trigger by pushing a tag matching v*  (e.g. `gh release create v0.5.1 --generate-notes`).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # gh release upload needs write to releases

jobs:
  build-and-attach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build:cli

      - name: Stage release asset
        run: |
          set -eu
          test -f dist/cli/main.mjs
          mkdir -p release
          cp dist/cli/main.mjs release/krabs.mjs
          chmod +x release/krabs.mjs
          ls -la release/

      - name: Ensure release exists, then upload binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes
          fi
          gh release upload "$TAG" release/krabs.mjs \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
