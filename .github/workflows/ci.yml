name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --strict-builds=false
      - name: Typecheck
        run: pnpm typecheck
      - name: Tests
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          # Stub Clerk vars so the Next.js build doesn't fail when CLERK_* is empty.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_stub
          CLERK_SECRET_KEY: sk_test_stub
          DATABASE_URL: file:./data/ci.db

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --strict-builds=false
      - name: Build CLI
        working-directory: ./cli
        run: |
          pnpm install --no-frozen-lockfile --strict-builds=false
          ./node_modules/.bin/tsup
      - name: Verify bin
        working-directory: ./cli
        run: |
          test -x dist/index.js
          node dist/index.js --version
