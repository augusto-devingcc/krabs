services:
  krabs:
    build: .
    image: krabs:local
    container_name: krabs
    restart: unless-stopped
    ports:
      - "${KRABS_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: file:/app/data/krabs.db
